<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Security Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin security dashboard for managing reports, icons, installations, and tools.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="shortcut icon" href="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nextdns.svg"
        type="image/x-icon">

    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-base: #0f1117;
            --bg-surface: #161820;
            --bg-elevated: #1c1e28;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-bg-hover: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-border-hover: rgba(255, 255, 255, 0.14);
            --glass-highlight: rgba(255, 255, 255, 0.12);
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-muted: #5f6368;
            --accent: #8ab4f8;
            --accent-dim: rgba(138, 180, 248, 0.15);
            --accent-glow: rgba(138, 180, 248, 0.08);
            --green: #81c995;
            --green-dim: rgba(129, 201, 149, 0.12);
            --amber: #fdd663;
            --amber-dim: rgba(253, 214, 99, 0.12);
            --purple: #c58af9;
            --purple-dim: rgba(197, 138, 249, 0.12);
            --red: #f28b82;
            --red-dim: rgba(242, 139, 130, 0.12);
            --cyan: #78d9ec;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --mono: 'SF Mono', 'Fira Code', 'Roboto Mono', monospace;
            --sidebar-w: 256px;
            --sidebar-collapsed: 68px;
            --header-h: 60px;
            --r-sm: 8px;
            --r-md: 12px;
            --r-lg: 16px;
            --r-xl: 20px;
            --r-full: 9999px;
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            font-family: var(--font);
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* Interactive Canvas Background */
        #bgCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .skip-link {
            position: absolute;
            top: -100%;
            left: 16px;
            background: var(--accent);
            color: #000;
            padding: 8px 16px;
            border-radius: var(--r-md);
            font-weight: 600;
            font-size: .875rem;
            z-index: 10000;
            text-decoration: none;
            transition: top .15s var(--ease);
        }

        .skip-link:focus {
            top: 16px;
        }

        /* ===== LIQUID GLASS MIXIN ===== */
        .glass {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12), inset 0 1px 0 var(--glass-highlight);
        }

        .glass:hover {
            border-color: var(--glass-border-hover);
        }

        /* ===== LOGIN PAGE ===== */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .login-page.hidden {
            display: none;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 36px;
            border-radius: var(--r-xl);
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.07) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(40px) saturate(1.3);
            -webkit-backdrop-filter: blur(40px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 32px 64px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: fadeUp .6s var(--ease);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(.98);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(210deg, #4d4d4d, #000000);
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(138, 180, 248, 0.2);
        }

        .login-logo i {
            font-size: 1.75rem;
            color: #fff;
        }

        .login-header h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -.02em;
            margin-bottom: 4px;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: .8125rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: .8125rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: var(--r-md);
            border: 1.5px solid var(--glass-border);
            font-size: .875rem;
            font-family: var(--font);
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
            transition: all .2s var(--ease);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group input:hover {
            border-color: var(--glass-border-hover);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
            background: rgba(255, 255, 255, 0.06);
        }

        .form-group input.input-error {
            border-color: var(--red);
        }

        .form-group input.input-error:focus {
            box-shadow: 0 0 0 3px var(--red-dim);
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 4px;
            display: flex;
            border-radius: var(--r-sm);
            transition: color .15s;
        }

        .password-toggle:hover {
            color: var(--text-secondary);
        }

        .login-btn {
            width: 100%;
            padding: 11px 16px;
            background: var(--accent);
            border: none;
            border-radius: var(--r-md);
            color: #111;
            font-size: .875rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            transition: all .2s var(--ease);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            box-shadow: 0 4px 16px rgba(138, 180, 248, 0.3);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: scale(.98);
        }

        .login-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn .btn-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.2);
            border-top-color: #111;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin-right: 8px;
        }

        .login-btn.loading .btn-spinner {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message {
            margin-top: 14px;
            text-align: center;
            font-size: .8125rem;
            padding: 10px 14px;
            border-radius: var(--r-md);
            display: none;
            font-weight: 500;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .message.error {
            color: var(--red);
            background: var(--red-dim);
            border: 1px solid rgba(242, 139, 130, 0.2);
            display: flex;
        }

        .message.success {
            color: var(--green);
            background: var(--green-dim);
            border: 1px solid rgba(129, 201, 149, 0.2);
            display: flex;
        }

        /* ===== DASHBOARD ===== */
        .dashboard-page {
            display: none;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .dashboard-page.active {
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: var(--sidebar-w);
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            background: linear-gradient(180deg, rgba(22, 24, 32, 0.92) 0%, rgba(15, 17, 23, 0.96) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--glass-border);
            transition: width .35s var(--ease), transform .35s var(--ease);
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed);
        }

        .sidebar.collapsed .sidebar-brand-text,
        .sidebar.collapsed .sidebar-brand-sub,
        .sidebar.collapsed .sidebar-section-label,
        .sidebar.collapsed .sidebar-link span,
        .sidebar.collapsed .sidebar-link .link-count,
        .sidebar.collapsed .sidebar-user-info {
            display: none;
        }

        .sidebar.collapsed .sidebar-link {
            justify-content: center;
            padding: 10px;
        }

        .sidebar.collapsed .sidebar-link i {
            margin: 0;
            font-size: 1.1rem;
        }

        .sidebar.collapsed .sidebar-header {
            padding: 18px 10px 14px;
            justify-content: center;
        }

        .sidebar.collapsed .sidebar-brand {
            justify-content: center;
        }

        .sidebar.collapsed .sidebar-footer {
            padding: 12px 8px;
        }

        .sidebar.collapsed .sidebar-user {
            justify-content: center;
            padding: 8px;
        }

        .sidebar.collapsed .logout-btn {
            display: none;
        }

        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--glass-border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-brand-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
            flex-shrink: 0;
        }

        .sidebar-brand-text {
            font-weight: 700;
            font-size: .9375rem;
            color: var(--text-primary);
            letter-spacing: -.01em;
            white-space: nowrap;
        }

        .sidebar-brand-sub {
            font-size: .6875rem;
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px 10px;
        }

        .sidebar-section-label {
            font-size: .625rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .1em;
            color: var(--text-muted);
            padding: 8px 10px;
            margin-top: 14px;
        }

        .sidebar-section-label:first-child {
            margin-top: 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 10px;
            border-radius: var(--r-md);
            font-size: .8125rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .2s var(--ease);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font);
            position: relative;
            text-decoration: none;
        }

        .sidebar-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg-hover);
        }

        .sidebar-link.active {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .sidebar-link.active i {
            color: var(--accent);
        }

        .sidebar-link i {
            width: 18px;
            text-align: center;
            font-size: .85rem;
            color: var(--text-muted);
            flex-shrink: 0;
            transition: color .15s;
        }

        .sidebar-link:hover i {
            color: var(--text-secondary);
        }

        .sidebar-link .link-count {
            margin-left: auto;
            font-size: .65rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--glass-bg);
            padding: 2px 7px;
            border-radius: var(--r-full);
        }

        .sidebar-link.active .link-count {
            background: rgba(138, 180, 248, 0.1);
            color: var(--accent);
        }

        .sidebar-footer {
            padding: 10px;
            border-top: 1px solid var(--glass-border);
        }

        .sidebar-user {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--r-md);
        }

        .sidebar-user-avatar {
            width: 30px;
            height: 30px;
            border-radius: var(--r-full);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: var(--accent-dim);
            color: var(--accent);
        }

        .sidebar-user-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-user-name {
            font-weight: 600;
            font-size: .8125rem;
            color: var(--text-primary);
        }

        .sidebar-user-role {
            font-size: .6875rem;
            color: var(--text-muted);
        }

        .logout-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            padding: 7px;
            border-radius: var(--r-md);
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logout-btn:hover {
            background: var(--red-dim);
            border-color: rgba(242, 139, 130, 0.3);
            color: var(--red);
        }

        .collapse-btn {
            position: absolute;
            right: -12px;
            top: 68px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .6rem;
            z-index: 101;
            transition: all .2s;
        }

        .collapse-btn:hover {
            background: var(--accent);
            color: #111;
            border-color: var(--accent);
        }

        /* ===== MAIN ===== */
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            transition: margin-left .35s var(--ease);
        }

        .sidebar.collapsed~.main-content {
            margin-left: var(--sidebar-collapsed);
        }

        /* ===== TOPBAR ===== */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            padding: 0 28px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: rgba(15, 17, 23, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--glass-border);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: 1px solid var(--glass-border);
            border-radius: var(--r-md);
            padding: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all .15s;
        }

        .mobile-menu-btn:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
        }

        .topbar-title {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -.02em;
        }

        .topbar-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .topbar-search {
            position: relative;
            max-width: 360px;
            width: 100%;
        }

        .topbar-search input {
            width: 100%;
            padding: 8px 12px 8px 34px;
            border: 1.5px solid var(--glass-border);
            border-radius: var(--r-md);
            font-size: .8125rem;
            font-family: var(--font);
            color: var(--text-primary);
            background: var(--glass-bg);
            transition: all .2s var(--ease);
        }

        .topbar-search input::placeholder {
            color: var(--text-muted);
        }

        .topbar-search input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
            background: rgba(255, 255, 255, 0.05);
        }

        .topbar-search i {
            position: absolute;
            left: 11px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: .8rem;
            pointer-events: none;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar-icon-btn {
            position: relative;
            background: none;
            border: 1px solid transparent;
            border-radius: var(--r-md);
            padding: 8px 9px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all .15s;
            font-size: .9rem;
        }

        .topbar-icon-btn:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
            border-color: var(--glass-border);
        }

        .notif-badge {
            position: absolute;
            top: 5px;
            right: 7px;
            width: 7px;
            height: 7px;
            background: var(--red);
            border-radius: 50%;
            border: 2px solid var(--bg-base);
        }

        .topbar-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--accent-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--accent);
            border: 2px solid transparent;
            transition: border-color .15s;
        }

        .topbar-avatar:hover {
            border-color: var(--accent);
        }

        /* Dropdowns */
        .dropdown {
            position: relative;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 200px;
            border-radius: var(--r-lg);
            padding: 6px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-6px);
            transition: all .2s var(--ease);
            z-index: 200;
            background: rgba(22, 24, 32, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        .dropdown.open .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 8px 11px;
            border-radius: var(--r-sm);
            font-size: .775rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all .15s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: var(--font);
        }

        .dropdown-item:hover {
            background: var(--glass-bg-hover);
            color: var(--text-primary);
        }

        .dropdown-item i {
            width: 14px;
            text-align: center;
            font-size: .75rem;
        }

        .dropdown-divider {
            height: 1px;
            background: var(--glass-border);
            margin: 4px 0;
        }

        .dropdown-header {
            padding: 6px 11px;
            font-size: .6875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .06em;
        }

        /* ===== PAGE CONTENT ===== */
        .page-content {
            padding: 24px 28px;
            max-width: 1240px;
        }

        /* ===== STATS ===== */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-card {
            border-radius: var(--r-lg);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            overflow: hidden;
            cursor: default;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: all .3s var(--ease);
        }

        .stat-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .stat-icon.blue {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .stat-icon.green {
            background: var(--green-dim);
            color: var(--green);
        }

        .stat-icon.amber {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .stat-icon.purple {
            background: var(--purple-dim);
            color: var(--purple);
        }

        .stat-info h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.03em;
            line-height: 1;
        }

        .stat-info p {
            font-size: .7rem;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 3px;
        }

        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: .65rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: var(--r-full);
            margin-top: 5px;
        }

        .stat-trend.up {
            color: var(--green);
            background: var(--green-dim);
        }

        /* ===== CHARTS ===== */
        .charts-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .chart-card {
            border-radius: var(--r-lg);
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01));
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: all .3s var(--ease);
        }

        .chart-card:hover {
            border-color: var(--glass-border-hover);
        }

        .chart-card h3 {
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-card h3 i {
            color: var(--text-muted);
            font-size: .75rem;
        }

        .chart-container {
            position: relative;
            height: 140px;
            display: flex;
            align-items: flex-end;
            gap: 4px;
        }

        .chart-bar {
            flex: 1;
            border-radius: 4px 4px 0 0;
            transition: height .8s var(--spring);
            cursor: pointer;
            position: relative;
            min-width: 8px;
            opacity: .85;
        }

        .chart-bar:hover {
            opacity: 1;
            filter: brightness(1.2);
        }

        .chart-bar-tooltip {
            position: absolute;
            bottom: calc(100% + 5px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-elevated);
            border: 1px solid var(--glass-border);
            padding: 3px 7px;
            border-radius: var(--r-sm);
            font-size: .65rem;
            color: var(--text-primary);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s;
        }

        .chart-bar:hover .chart-bar-tooltip {
            opacity: 1;
        }

        .chart-labels {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .chart-labels span {
            flex: 1;
            text-align: center;
            font-size: .575rem;
            color: var(--text-muted);
        }

        .mini-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .mini-bar-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-bar-label {
            font-size: .75rem;
            color: var(--text-secondary);
            width: 90px;
            flex-shrink: 0;
        }

        .mini-bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: var(--r-full);
            overflow: hidden;
        }

        .mini-bar-fill {
            height: 100%;
            border-radius: var(--r-full);
            transition: width 1s var(--spring);
        }

        .mini-bar-value {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-primary);
            width: 32px;
            text-align: right;
        }

        /* ===== SECTIONS ===== */
        .section {
            margin-bottom: 36px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: .9375rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -.01em;
        }

        .section-title i {
            color: var(--text-muted);
            font-size: .8rem;
        }

        .section-count {
            font-size: .7rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--glass-bg);
            padding: 3px 9px;
            border-radius: var(--r-full);
            border: 1px solid var(--glass-border);
        }

        /* ===== ITEMS GRID ===== */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }

        /* ===== ITEM CARD ===== */
        .item-card {
            border-radius: var(--r-lg);
            padding: 20px 18px;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015));
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transition: all .3s var(--ease);
        }

        .item-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .item-icon,
        .item-image {
            width: 48px;
            height: 48px;
            display: block;
            margin-bottom: 10px;
            object-fit: contain;
            border-radius: var(--r-md);
        }

        .item-icon-container {
            width: 48px;
            height: 48px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-icon-fa {
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        .item-name {
            font-weight: 600;
            font-size: .8125rem;
            color: var(--text-primary);
            letter-spacing: -.01em;
            margin-bottom: 4px;
        }

        .item-status {
            font-size: .65rem;
            padding: 3px 9px;
            border-radius: var(--r-full);
            font-weight: 600;
            margin-bottom: 14px;
            display: inline-block;
        }

        .item-status.active {
            color: var(--green);
            background: var(--green-dim);
        }

        .item-status.available {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .item-actions {
            display: flex;
            gap: 6px;
            width: 100%;
            margin-top: auto;
        }

        /* ===== BUTTONS ===== */
        .btn {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: var(--r-md);
            cursor: pointer;
            font-size: .7rem;
            font-weight: 600;
            font-family: var(--font);
            transition: all .2s var(--ease);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-decoration: none;
            line-height: 1;
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: #111;
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(138, 180, 248, 0.25);
            transform: translateY(-1px);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(.97);
        }

        .btn-secondary {
            background: var(--glass-bg-hover);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.09);
            color: var(--text-primary);
            border-color: var(--glass-border-hover);
        }

        .btn-success {
            background: var(--green);
            color: #111;
        }

        .btn-success:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(129, 201, 149, 0.25);
            transform: translateY(-1px);
        }

        /* ===== COMMAND CARD ===== */
        .command-card {
            text-align: left;
        }

        .command-block {
            background: rgba(0, 0, 0, 0.3);
            color: #d1d5db;
            padding: 10px 14px;
            border-radius: var(--r-md);
            font-family: var(--mono);
            font-size: .7rem;
            margin-bottom: 14px;
            word-break: break-all;
            width: 100%;
            position: relative;
            line-height: 1.6;
            border: 1px solid var(--glass-border);
        }

        .command-block-label {
            font-size: .6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            margin-bottom: 4px;
            display: block;
        }

        .info-callout {
            width: 100%;
            padding: 14px;
            border-radius: var(--r-md);
            margin-bottom: 14px;
            font-size: .7rem;
            line-height: 1.6;
        }

        .info-callout.warning {
            background: var(--amber-dim);
            border: 1px solid rgba(253, 214, 99, 0.15);
        }

        .info-callout.warning .callout-title {
            color: var(--amber);
            font-weight: 700;
            font-size: .7rem;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-callout ol {
            margin: 0;
            padding-left: 18px;
            color: var(--text-secondary);
        }

        .info-callout ol li {
            margin-bottom: 3px;
        }

        .info-callout.danger {
            background: var(--red-dim);
            border: 1px solid rgba(242, 139, 130, 0.15);
        }

        .info-callout.danger .callout-title {
            color: var(--red);
            font-weight: 700;
            font-size: .7rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            opacity: 0;
            transition: opacity .25s;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal {
            background: rgba(22, 24, 32, 0.96);
            backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-xl);
            max-width: 460px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
            animation: modalIn .3s var(--ease);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.96) translateY(8px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--glass-border);
        }

        .modal-header h2 {
            font-size: .9375rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            border-radius: var(--r-sm);
            font-size: 1rem;
            transition: all .15s;
            display: flex;
        }

        .modal-close:hover {
            color: var(--text-primary);
            background: var(--glass-bg-hover);
        }

        .modal-body {
            padding: 22px;
        }

        .modal-body p {
            font-size: .8125rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding: 14px 22px;
            border-top: 1px solid var(--glass-border);
        }

        .modal-footer .btn {
            flex: initial;
            padding: 8px 18px;
        }

        /* ===== TOAST ===== */
        .toast-container {
            position: fixed;
            top: 72px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            padding: 10px 14px;
            border-radius: var(--r-md);
            font-weight: 500;
            font-size: .775rem;
            display: flex;
            align-items: center;
            gap: 9px;
            min-width: 240px;
            max-width: 360px;
            background: rgba(22, 24, 32, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            animation: toastIn .3s var(--ease);
        }

        .toast .toast-icon {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: .65rem;
        }

        .toast.success {
            border-left: 3px solid var(--green);
        }

        .toast.success .toast-icon {
            background: var(--green-dim);
            color: var(--green);
        }

        .toast.error {
            border-left: 3px solid var(--red);
        }

        .toast.error .toast-icon {
            background: var(--red-dim);
            color: var(--red);
        }

        .toast.warning {
            border-left: 3px solid var(--amber);
        }

        .toast.warning .toast-icon {
            background: var(--amber-dim);
            color: var(--amber);
        }

        .toast.copy {
            border-left: 3px solid var(--accent);
        }

        .toast.copy .toast-icon {
            background: var(--accent-dim);
            color: var(--accent);
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(24px) scale(.96);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .toast.fadeOut {
            animation: toastOut .2s ease forwards;
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateX(24px) scale(.96);
            }
        }

        /* ===== SKELETON ===== */
        .skeleton-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--r-lg);
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .skeleton {
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.02) 25%, rgba(255, 255, 255, 0.05) 50%, rgba(255, 255, 255, 0.02) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--r-sm);
        }

        .skeleton-circle {
            width: 48px;
            height: 48px;
            border-radius: var(--r-md);
            margin-bottom: 10px;
        }

        .skeleton-text {
            height: 12px;
            width: 72px;
            margin-bottom: 14px;
        }

        .skeleton-btn {
            height: 30px;
            width: 100%;
            border-radius: var(--r-md);
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .empty-state {
            text-align: center;
            padding: 40px 28px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 1.75rem;
            margin-bottom: 14px;
            display: block;
        }

        .empty-state p {
            font-size: .8125rem;
            max-width: 280px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 90;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width:1024px) {
            .sidebar {
                transform: translateX(-100%);
                width: var(--sidebar-w) !important;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content,
            .sidebar.collapsed~.main-content {
                margin-left: 0 !important;
            }

            .mobile-menu-btn {
                display: flex;
            }

            .collapse-btn {
                display: none;
            }

            .charts-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width:768px) {
            .page-content {
                padding: 16px 14px;
            }

            .topbar {
                padding: 0 14px;
            }

            .topbar-center {
                display: none;
            }

            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 10px;
            }

            .stats-bar {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .toast-container {
                top: auto;
                bottom: 14px;
                right: 14px;
                left: 14px;
            }

            .toast {
                max-width: 100%;
                min-width: auto;
            }
        }

        @media (max-width:480px) {
            .items-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                grid-template-columns: 1fr;
            }

            .login-container {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>
    <a href="#mainContent" class="skip-link">Skip to content</a>

    <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>

    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Details</h2>
                <button class="modal-close" onclick="closeModal()" aria-label="Close modal"><i
                        class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- LOGIN PAGE -->
    <div class="login-page" id="loginPage" role="main">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo"><img
                        src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nextdns.svg" alt="" width="36"
                        height="36"></div>
                <h1>Admin Panel</h1>
                <p>Enter your credentials to access the dashboard</p>
            </div>
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required autocomplete="username"
                        aria-required="true">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Enter your password" required
                            autocomplete="current-password" aria-required="true">
                        <button type="button" class="password-toggle" id="passwordToggle"
                            aria-label="Toggle password visibility" tabindex="0">
                            <i class="fas fa-eye" id="passwordToggleIcon"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-spinner" aria-hidden="true"></span>
                    <span class="btn-text">Sign in</span>
                </button>
                <div id="message" class="message" role="alert" aria-live="assertive"></div>
            </form>
        </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="dashboard-page" id="dashboardPage">
        <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>

        <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main navigation">
            <button class="collapse-btn" id="collapseBtn" aria-label="Toggle sidebar" title="Toggle sidebar"><i
                    class="fas fa-chevron-left"></i></button>
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-brand-icon" aria-hidden="true"><img
                            src="https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/nextdns.svg" alt=""
                            width="28" height="28"></div>
                    <div>
                        <div class="sidebar-brand-text">Meowww...</div>
                        <div class="sidebar-brand-sub">Ghop Ghop Ghoppp!!</div>
                    </div>
                </div>
            </div>
            <div class="sidebar-nav">
                <div class="sidebar-section-label">Overview</div>
                <button class="sidebar-link active" data-section="all" onclick="scrollToSection('all')">
                    <i class="fas fa-grip"></i> <span>All Items</span>
                </button>
                <div class="sidebar-section-label">Categories</div>
                <button class="sidebar-link" data-section="security" onclick="scrollToSection('security')">
                    <i class="fas fa-shield-alt"></i> <span>Security Reports</span>
                    <span class="link-count" id="countSecurity">10</span>
                </button>
                <button class="sidebar-link" data-section="icons" onclick="scrollToSection('icons')">
                    <i class="fas fa-image"></i> <span>Icons Library</span>
                    <span class="link-count" id="countIcons">15</span>
                </button>
                <button class="sidebar-link" data-section="installations" onclick="scrollToSection('installations')">
                    <i class="fas fa-download"></i> <span>Installations</span>
                    <span class="link-count" id="countInstallations">3</span>
                </button>
                <button class="sidebar-link" data-section="office365" onclick="scrollToSection('office365')">
                    <i class="fas fa-building"></i> <span>Office 365</span>
                    <span class="link-count" id="countOffice">2</span>
                </button>
                <button class="sidebar-link" data-section="activation" onclick="scrollToSection('activation')">
                    <i class="fas fa-key"></i> <span>Activation</span>
                    <span class="link-count" id="countActivation">4</span>
                </button>
            </div>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar" aria-hidden="true">

<script>
    // ===== INTERACTIVE PARTICLE BACKGROUND =====
    (function () {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -1000, y: -1000 };
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.3;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.opacity = Math.random() * 0.3 + 0.05;
                this.baseOpacity = this.opacity;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > w) this.speedX *= -1;
                if (this.y < 0 || this.y > h) this.speedY *= -1;
                const dx = mouse.x - this.x, dy = mouse.y - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 150) {
                    this.opacity = this.baseOpacity + (1 - dist / 150) * 0.3;
                    this.x -= dx * 0.008;
                    this.y -= dy * 0.008;
                } else {
                    this.opacity += (this.baseOpacity - this.opacity) * 0.05;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(138,180,248,${this.opacity})`;
                ctx.fill();
            }
        }

        const count = Math.min(80, Math.floor((w * h) / 15000));
        for (let i = 0; i < count; i++) particles.push(new Particle());

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(138,180,248,${0.06 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            particles.forEach(p => { p.update(); p.draw(); });
            drawLines();
            requestAnimationFrame(animate);
        }
        animate();

        document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        document.addEventListener('mouseleave', () => { mouse.x = -1000; mouse.y = -1000; });
    })();

    // ===== ANIMATED COUNTER =====
    function animateCounter(el, target, duration = 800) {
        let start = 0; const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            el.textContent = Math.round(eased * target);
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    // ===== ACTION FUNCTIONS =====
    function openDashboard(file) { window.open('../dashboard/' + file, '_blank'); }
    function openInstallation(file) { window.open('../installations/' + file, '_blank'); }
    function openLink(url) { window.open(url, '_blank'); }

    function copyLink(path) {
        const baseUrl = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/'));
        navigator.clipboard.writeText(baseUrl + '/' + path).then(() => showToast('Link copied to clipboard', 'copy')).catch(() => showToast('Failed to copy link', 'error'));
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard', 'copy')).catch(() => showToast('Failed to copy', 'error'));
    }

    function downloadIcon(filename) {
        const link = document.createElement('a');
        link.href = '../ico/' + filename; link.download = filename;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        showToast(filename + ' downloaded', 'success');
    }

    // ===== TOAST =====
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.setAttribute('role', 'status');
        const iconMap = { success: 'fa-check', error: 'fa-times', warning: 'fa-exclamation', copy: 'fa-check' };
        toast.innerHTML = '<span class="toast-icon" aria-hidden="true"><i class="fas ' + (iconMap[type] || 'fa-info') + '"></i></span><span>' + message + '</span>';
        container.appendChild(toast);
        const toasts = container.querySelectorAll('.toast:not(.fadeOut)');
        if (toasts.length > 3) { toasts[0].classList.add('fadeOut'); setTimeout(() => toasts[0].remove(), 250); }
        setTimeout(() => toast.classList.add('fadeOut'), 2700);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
